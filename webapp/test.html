<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест приложения</title>
</head>
<body>
    <h1>Тест загрузки скрипта</h1>
    <div id="test">Проверка...</div>
    <script>
        console.log('Тестовый скрипт загружен!');
        document.getElementById('test').textContent = 'Скрипт работает!';
        
        // Проверяем загрузку app.js
        setTimeout(function() {
            if (window.appLoaded) {
                console.log('✓ app.js загружен!');
                document.getElementById('test').textContent = 'app.js загружен! Баланс: ' + (window.state ? window.state.balance : 'не определен');
            } else {
                console.error('✗ app.js НЕ загружен!');
                document.getElementById('test').textContent = 'app.js НЕ загружен! Проверьте путь к файлу.';
            }
        }, 1000);
    </script>
    <script src="app.js"></script>
</body>
</html>
